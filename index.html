  <style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

html, body{
  height:100%;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  overflow-x:hidden;
  background:
    radial-gradient(circle at top left,#7c3aed33,transparent 30%),
    radial-gradient(circle at bottom right,#06b6d433,transparent 30%),
    linear-gradient(135deg,#050816,#0f172a,#111827);
  color:white;
  position:relative;
}

/* glowing background */
body::before,
body::after{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  filter:blur(160px);
  opacity:0.15;
  z-index:0;
}

body::before{
  background:#7c3aed;
  top:-120px;
  left:-120px;
}

body::after{
  background:#06b6d4;
  bottom:-120px;
  right:-120px;
}

.container{
  position:relative;
  z-index:1;
  width:100%;
  max-width:550px;
  padding:30px;
  border-radius:24px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(18px);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h1{
  font-size:2.3rem;
  text-align:center;
  margin-bottom:10px;
  background:linear-gradient(90deg,#a78bfa,#22d3ee);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  color:#cbd5e1;
  text-align:center;
  margin-bottom:20px;
  line-height:1.5;
}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:1rem;
  margin-bottom:15px;
  outline:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#7c3aed,#06b6d4);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}

.card{
  margin-top:20px;
  padding:30px 20px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:220px;
}

.role{
  font-size:1.3rem;
  margin-bottom:12px;
  color:#c4b5fd;
  font-weight:bold;
  text-align:center;
}

.word{
  font-size:2rem;
  font-weight:800;
  text-align:center;
  text-transform:uppercase;
  background:linear-gradient(90deg,#fff,#a5f3fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.small{
  margin-top:10px;
  color:#cbd5e1;
  text-align:center;
  font-size:0.95rem;
}

.playerInside{
  font-size:1rem;
  font-weight:700;
  margin-bottom:10px;
  color:#a5b4fc;
  text-align:center;
}

.hidden{ display:none; }

/* MOBILE RESPONSIVE FIX */
@media (max-width:600px){
  body{
    align-items:flex-start;
    padding-top:30px;
  }

  .container{
    padding:20px;
    border-radius:18px;
  }

  h1{
    font-size:1.8rem;
  }

  .word{
    font-size:1.6rem;
  }

  .role{
    font-size:1.1rem;
  }
}
  </style>

    </div>

    let totalPlayers = 0;

    let revealed = false;
    let chaosModeEnabled = true;
    let chaosRound = false;
    let chaosHints = [];
    function startGame() {
      if(savedPlayers > 0){
        totalPlayers = savedPlayers;
      } else {
        totalPlayers = parseInt(document.getElementById('players').value);
        savedPlayers = totalPlayers;
      }

      if (!totalPlayers || totalPlayers < 3) {
        alert('Minimum 3 players required');
        return;
      }

      imposter = Math.floor(Math.random() * totalPlayers) + 1;
      chaosModeEnabled = document.getElementById('chaosToggle').checked;

      // 40% random chance
      chaosRound = chaosModeEnabled && Math.random() < 0.10;

      chaosHints = [];
      startingPlayer = Math.floor(Math.random() * totalPlayers) + 1;
      const selectedBoxes = document.querySelectorAll('.categoryCheck:checked');

      if(selectedBoxes.length === 0){
        alert('Select at least one category');
        return;
      }

      let allWords = [];

      selectedBoxes.forEach(box => {
        allWords = allWords.concat(categories[box.value]);
      });

      selectedWord = allWords[Math.floor(Math.random() * allWords.length)];
      // Create random chaos hints from SAME category
      if (chaosRound) {

        const selectedCategoryName =
          selectedBoxes[Math.floor(Math.random() * selectedBoxes.length)].value;

        const categoryWords = categories[selectedCategoryName];

        const usedHints = [];

      for(let i = 0; i < totalPlayers; i++){

        let randomItem;
        let tries = 0;

        do{
          randomItem =
            categoryWords[Math.floor(Math.random() * categoryWords.length)];

          tries++;

        } while(
          usedHints.includes(randomItem.hint) &&
          tries < 50
        );

        usedHints.push(randomItem.hint);
        chaosHints.push(randomItem.hint);
      }
      }

      document.getElementById('setupScreen').classList.add('hidden');
      document.getElementById('gameScreen').classList.remove('hidden');

      currentPlayer = 1;
      updatePlayerScreen();
    }

    function updatePlayerScreen() {
      revealed = false;

      document.getElementById('playerInside').innerText =
      `Player ${currentPlayer} / ${totalPlayers}`;
      document.getElementById('roleText').innerText = 'Pass the device secretly';
      document.getElementById('wordText').innerText = 'Tap Reveal';
      document.getElementById('smallText').innerText = '';

      document.getElementById('revealBtn').classList.remove('hidden');
      document.getElementById('nextBtn').classList.add('hidden');
    }

function revealRole() {
  if (revealed) return;

  // CHAOS MODE
  if (chaosRound) {

    document.getElementById('roleText').innerText =
      '❌ You are the Imposter';

    document.getElementById('wordText').innerText =
      `Hint: ${chaosHints[currentPlayer - 1]}`;

    document.getElementById('smallText').innerText =
      'Blend in and avoid getting caught!';

  } else {

    // NORMAL MODE
    if (currentPlayer === imposter) {

      document.getElementById('roleText').innerText =
        '❌ You are the Imposter';

      document.getElementById('wordText').innerText =
        `Hint: ${selectedWord.hint}`;

      document.getElementById('smallText').innerText =
        'Blend in and avoid getting caught!';

    } else {

      document.getElementById('roleText').innerText =
        '✅ Normal Player';

      document.getElementById('wordText').innerText =
        selectedWord.word;

      document.getElementById('smallText').innerText =
        'Find the imposter.';
    }
  }

  revealed = true;

  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
}

function revealImposter() {

  if (chaosRound) {

    document.querySelector('.card').innerHTML = `

      <div class="word">
        Everyone was the Imposter
      </div>

      <div class="small" style="margin-top:15px;">
        Every player received different hints from the same category.
      </div>
    `;

    return;
  }

  // NORMAL ROUND
  document.querySelector('.card').innerHTML = `
    <div class="role">❌ Imposter Revealed</div>
    <div class="word">Player ${imposter}</div>
    <div class="small">The secret word was: ${selectedWord.word}</div>
  `;
}

for(let i = 0; i < totalPlayers; i++){

      currentPlayer++;
      revealed = false;
