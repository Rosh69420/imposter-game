<head>
  <meta charset="UTF-8" />

  <title>Imposter Word Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1f2937, #312e81);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2.2rem;
    }

    p {
      color: #d1d5db;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #6366f1;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
    }

    button:hover {
      background: #4f46e5;
      transform: scale(1.02);
    }

    .card {
      margin-top: 20px;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .role {
      font-size: 1.4rem;
      margin-bottom: 15px;
      color: #a5b4fc;
    }

    .word {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
    }

    .small {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .hidden {
      display: none;
    }

    .playerCount {
      font-size: 1.1rem;
      margin-top: 10px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎭 Imposter Word Game</h1>
    <p>One player is the imposter and receives only a hint. Everyone else gets the real word.</p>

    <div id="setupScreen">
      <input type="number" id="players" placeholder="Number of Players" min="3" max="20" />
      <div style="text-align:left;margin-bottom:15px;">
        <div style="margin-bottom:10px;font-weight:bold;">Select Categories</div>

        <label><input type="checkbox" class="categoryCheck" value="Animals" checked> Animals</label><br>
        <label><input type="checkbox" class="categoryCheck" value="Brands" checked> Brands</label><br>
        <label><input type="checkbox" class="categoryCheck" value="Anime" checked> Anime</label><br>
        <label><input type="checkbox" class="categoryCheck" value="Objects" checked> Objects</label><br>
        <label><input type="checkbox" class="categoryCheck" value="Games" checked> Games</label><br>
        <label><input type="checkbox" class="categoryCheck" value="Sports" checked> Sports</label>
      </div>

      <button onclick="startGame()">Start Game</button>
    </div>

    <div id="gameScreen" class="hidden">
      <div class="playerCount" id="playerText"></div>

      <div class="card">
        <div class="role" id="roleText">Pass the device</div>
        <div class="word" id="wordText">Tap Reveal</div>
        <div class="small" id="smallText"></div>
      </div>

      <button id="revealBtn" onclick="revealRole()">Reveal</button>
      <button id="nextBtn" class="hidden" onclick="nextPlayer()">Next Player</button>
    </div>
  </div>

        { word: "Wiffle Ball", hint: "Holey plastic ball" },
        { word: "Teeball", hint: "Ball on tee" },
        { word: "Cricket T20", hint: "Short cricket" },
        { word: "Walking Football", hint: "No running soccer" },
        { word: "Dodgeball", hint: "Avoid being hit" },
        { word: "Capture the Flag", hint: "Team flag game" },
        { word: "Hula Hooping", hint: "Waist spin" },
        { word: "Unicycling", hint: "One wheel" },
        { word: "Trampolining", hint: "Bounce routine" },
        { word: "Freerunning", hint: "Parkour" },
        { word: "Drifting", hint: "Car slide" },
        { word: "Kart Racing", hint: "Small open wheel" },
        { word: "Calisthenics", hint: "Bodyweight" },
        { word: "Water Basketball", hint: "Pool hoops" },
        { word: "Beach Handball", hint: "Sand game" },
        { word: "Mini Golf", hint: "Putting obstacles" },
        { word: "Footvolley", hint: "Foot version" },
        { word: "Rugby", hint: "Tackle" },
        { word: "Marbles", hint: "Glass balls" },
        { word: "Hopscotch", hint: "Chalk grid" },
        { word: "Speed Skiing", hint: "Over 200 km/h" },
      ]
    };

    let totalPlayers = 0;
    let savedPlayers = 0;
    let currentPlayer = 1;
    let imposter = 0;
    let selectedWord = null;
    let revealed = false;

    function startGame() {
      if(savedPlayers > 0){
        totalPlayers = savedPlayers;
      } else {
        totalPlayers = parseInt(document.getElementById('players').value);
        savedPlayers = totalPlayers;
      }

      if (!totalPlayers || totalPlayers < 3) {
        alert('Minimum 3 players required');
        return;
      }

      imposter = Math.floor(Math.random() * totalPlayers) + 1;
      const selectedBoxes = document.querySelectorAll('.categoryCheck:checked');

      if(selectedBoxes.length === 0){
        alert('Select at least one category');
        return;
      }

      let allWords = [];

      selectedBoxes.forEach(box => {
        allWords = allWords.concat(categories[box.value]);
      });

      selectedWord = allWords[Math.floor(Math.random() * allWords.length)];

      document.getElementById('setupScreen').classList.add('hidden');
      document.getElementById('gameScreen').classList.remove('hidden');

      updatePlayerScreen();
    }

    function updatePlayerScreen() {
      revealed = false;

      document.getElementById('playerText').innerText = `Player ${currentPlayer} / ${totalPlayers}`;
      document.getElementById('roleText').innerText = 'Pass the device secretly';
      document.getElementById('wordText').innerText = 'Tap Reveal';
      document.getElementById('smallText').innerText = '';

      document.getElementById('revealBtn').classList.remove('hidden');
      document.getElementById('nextBtn').classList.add('hidden');
    }

    function revealRole() {
      if (revealed) return;

      if (currentPlayer === imposter) {
        document.getElementById('roleText').innerText = '🕵️ You are the Imposter';
        document.getElementById('wordText').innerText = `Hint: ${selectedWord.hint}`;
        document.getElementById('smallText').innerText = 'Blend in and avoid getting caught!';
      } else {
        document.getElementById('roleText').innerText = '✅ Normal Player';
        document.getElementById('wordText').innerText = selectedWord.word;
        document.getElementById('smallText').innerText = 'Find the imposter.';
      }

      revealed = true;

      document.getElementById('revealBtn').classList.add('hidden');
      document.getElementById('nextBtn').classList.remove('hidden');
    }

    function revealImposter() {
      document.querySelector('.card').innerHTML = `
        <div class="role">🕵️ Imposter Revealed</div>
        <div class="word">Player ${imposter}</div>
        <div class="small">The secret word was: ${selectedWord.word}</div>
      `;
    }

    function restartGame(){
      currentPlayer = 1;
      imposter = Math.floor(Math.random() * totalPlayers) + 1;

      const selectedBoxes = document.querySelectorAll('.categoryCheck:checked');
      let allWords = [];

      selectedBoxes.forEach(box => {
        allWords = allWords.concat(categories[box.value]);
      });

      selectedWord = allWords[Math.floor(Math.random() * allWords.length)];
      revealed = false;

      document.querySelector('.card').innerHTML = `
        <div class="role" id="roleText">Pass the device secretly</div>
        <div class="word" id="wordText">Tap Reveal</div>
        <div class="small" id="smallText"></div>
      `;

      document.getElementById('playerText').innerText = `Player ${currentPlayer} / ${totalPlayers}`;

      document.getElementById('revealBtn').classList.remove('hidden');
      document.getElementById('nextBtn').classList.add('hidden');
      document.getElementById('nextBtn').innerText = 'Next Player';
      document.getElementById('nextBtn').onclick = nextPlayer;

      updatePlayerScreen();
    };

      selectedWord = allWords[Math.floor(Math.random() * allWords.length)];

      document.getElementById('nextBtn').innerText = 'Next Player';
      document.getElementById('nextBtn').onclick = nextPlayer;

      updatePlayerScreen();
    

    function nextPlayer() {
      currentPlayer++;

      if (currentPlayer > totalPlayers) {
        document.querySelector('.card').innerHTML = `
          <div class="role">🎉 All Roles Assigned</div>
          <div class="small">Discuss and find the imposter!</div>
          <button onclick="revealImposter()" style="margin-top:20px;">Reveal Imposter</button>
        `;

        document.getElementById('playerText').innerText = 'Game Started';
        document.getElementById('nextBtn').innerText = 'Play Again';
        document.getElementById('nextBtn').onclick = () => restartGame();

        return;
      }

      updatePlayerScreen();
    }
  </script>

</body>
</html>
